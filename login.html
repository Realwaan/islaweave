<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Habiness | Artisan Marketplace</title>
  <meta name="description" content="Login to your Habiness account to shop handcrafted artisan goods from Central Visayas." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <!-- ============ NAVIGATION ============ -->
  <nav class="site-nav" id="site-nav" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Habiness Home"><img src="images/logo.png" alt="Habiness logo" class="nav-logo-img" loading="eager" fetchpriority="high" decoding="async" />Habi<span>ness</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="index.html#artisan">Artisans</a></li>
        <li><a href="index.html#values">About</a></li>
        <li>
          <button class="cart-btn" onclick="openCartDrawer()" aria-label="Open cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge">0</span>
          </button>
        </li>
      </ul>
      <div class="nav-right-mobile">
        <button class="cart-btn" onclick="openCartDrawer()" aria-label="Open cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge">0</span>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ============ LOGIN SECTION ============ -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Login to your Habiness account</p>
        </div>

        <!-- Error Message -->
        <div class="auth-error" id="login-error" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="login-error-text"></span>
        </div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              required 
              autocomplete="email"
              placeholder="your@email.com"
            />
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="password" 
                name="password" 
                required 
                autocomplete="current-password"
                placeholder="Enter your password"
              />
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <span class="field-error" id="password-error"></span>
          </div>

          <button type="submit" class="btn btn-auth" id="login-btn">
            <span class="btn-text">Login</span>
            <span class="btn-loader" style="display: none;">
              <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
              </svg>
            </span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>
        </div>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <a href="shop.html" class="btn btn-outline">Continue as Guest</a>
      </div>

      <div class="auth-illustration">
        <div class="auth-illustration-content">
          <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="50" y="50" width="300" height="200" rx="10" fill="#FFF8F0" stroke="#C08552" stroke-width="2"/>
            <path d="M100 120 L150 150 L200 100 L250 130 L300 90" stroke="#8C5A3C" stroke-width="3" fill="none"/>
            <circle cx="100" cy="120" r="6" fill="#C08552"/>
            <circle cx="150" cy="150" r="6" fill="#C08552"/>
            <circle cx="200" cy="100" r="6" fill="#C08552"/>
            <circle cx="250" cy="130" r="6" fill="#C08552"/>
            <circle cx="300" cy="90" r="6" fill="#C08552"/>
            <text x="200" y="220" text-anchor="middle" fill="#4B2E2B" font-family="Playfair Display" font-size="20" font-weight="600">Handcrafted with Care</text>
          </svg>
          <h2>Join Our Artisan Community</h2>
          <p>Shop unique handcrafted goods, support local artisans, and preserve centuries-old traditions.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="auth.js" defer></script>
  <script src="cart.js" defer></script>
  <script src="script.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (HabinessAuth.isLoggedIn()) {
        const redirect = sessionStorage.getItem('redirect_after_login') || 'shop.html';
        sessionStorage.removeItem('redirect_after_login');
        window.location.href = redirect;
        return;
      }

      const form = document.getElementById('login-form');
      const errorDiv = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');
      const loginBtn = document.getElementById('login-btn');
      const btnText = loginBtn.querySelector('.btn-text');
      const btnLoader = loginBtn.querySelector('.btn-loader');

      // Password toggle
      const passwordInput = document.getElementById('password');
      const passwordToggle = document.getElementById('password-toggle');
      const eyeOpen = passwordToggle.querySelector('.eye-open');
      const eyeClosed = passwordToggle.querySelector('.eye-closed');

      passwordToggle.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeOpen.style.display = isPassword ? 'none' : 'block';
        eyeClosed.style.display = isPassword ? 'block' : 'none';
      });

      // Form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Clear previous errors
        errorDiv.style.display = 'none';
        document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
        document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Show loading state
        loginBtn.disabled = true;
        btnText.style.display = 'none';
        btnLoader.style.display = 'inline-flex';

        // Simulate API delay
        await new Promise(resolve => setTimeout(resolve, 800));

        const result = HabinessAuth.login(email, password);

        if (result.success) {
          // Show success and redirect
          showToast('Welcome back! Redirecting...', 'success');
          
          setTimeout(() => {
            const redirect = sessionStorage.getItem('redirect_after_login') || 'shop.html';
            sessionStorage.removeItem('redirect_after_login');
            window.location.href = redirect;
          }, 1000);
        } else {
          // Show error
          errorText.textContent = result.error;
          errorDiv.style.display = 'flex';
          
          loginBtn.disabled = false;
          btnText.style.display = 'inline';
          btnLoader.style.display = 'none';

          // Focus first input
          document.getElementById('email').focus();
        }
      });

      // Real-time validation
      const emailInput = document.getElementById('email');
      emailInput.addEventListener('blur', () => {
        const email = emailInput.value.trim();
        const emailError = document.getElementById('email-error');
        
        if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailError.textContent = 'Please enter a valid email address';
          emailInput.classList.add('error');
        } else {
          emailError.textContent = '';
          emailInput.classList.remove('error');
        }
      });
    });

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast toast-${type} show`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
