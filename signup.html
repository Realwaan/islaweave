<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Habiness | Artisan Marketplace</title>
  <meta name="description" content="Create your Habiness account to shop handcrafted artisan goods from Central Visayas." />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <!-- ============ NAVIGATION ============ -->
  <nav class="site-nav" id="site-nav" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="Habiness Home"><img src="images/logo.png" alt="Habiness logo" class="nav-logo-img" loading="eager" fetchpriority="high" decoding="async" />Habi<span>ness</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="index.html#artisan">Artisans</a></li>
        <li><a href="index.html#values">About</a></li>
        <li>
          <button class="cart-btn" onclick="openCartDrawer()" aria-label="Open cart">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            <span class="cart-badge">0</span>
          </button>
        </li>
      </ul>
      <div class="nav-right-mobile">
        <button class="cart-btn" onclick="openCartDrawer()" aria-label="Open cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge">0</span>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ============ SIGNUP SECTION ============ -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join the Habiness community today</p>
        </div>

        <!-- Error Message -->
        <div class="auth-error" id="signup-error" style="display: none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="signup-error-text"></span>
        </div>

        <form id="signup-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name <span class="required">*</span></label>
              <input 
                type="text" 
                id="firstName" 
                name="firstName" 
                required 
                autocomplete="given-name"
                placeholder="Juan"
              />
              <span class="field-error" id="firstName-error"></span>
            </div>

            <div class="form-group">
              <label for="lastName">Last Name <span class="required">*</span></label>
              <input 
                type="text" 
                id="lastName" 
                name="lastName" 
                required 
                autocomplete="family-name"
                placeholder="Dela Cruz"
              />
              <span class="field-error" id="lastName-error"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              required 
              autocomplete="email"
              placeholder="your@email.com"
            />
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number <span class="optional">(optional)</span></label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              autocomplete="tel"
              placeholder="+63 912 345 6789"
            />
            <span class="field-error" id="phone-error"></span>
          </div>

          <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="password" 
                name="password" 
                required 
                autocomplete="new-password"
                placeholder="At least 6 characters"
              />
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <div class="password-strength" id="password-strength"></div>
            <span class="field-error" id="password-error"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                required 
                autocomplete="new-password"
                placeholder="Re-enter your password"
              />
              <button type="button" class="password-toggle" id="confirm-password-toggle" aria-label="Toggle password visibility">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <span class="field-error" id="confirmPassword-error"></span>
          </div>

          <button type="submit" class="btn btn-auth" id="signup-btn">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader" style="display: none;">
              <svg class="spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
              </svg>
            </span>
          </button>
        </form>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html" class="auth-link">Login</a></p>
        </div>
      </div>

      <div class="auth-illustration">
        <div class="auth-illustration-content">
          <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="200" cy="100" r="60" fill="#FFF8F0" stroke="#C08552" stroke-width="3"/>
            <path d="M200 100 L200 180" stroke="#8C5A3C" stroke-width="3"/>
            <path d="M170 150 L200 180 L230 150" stroke="#8C5A3C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="200" cy="100" r="25" fill="#C08552"/>
            <path d="M150 250 Q200 200 250 250" stroke="#C08552" stroke-width="3" fill="none"/>
            <text x="200" y="280" text-anchor="middle" fill="#4B2E2B" font-family="Playfair Display" font-size="18" font-weight="600">Discover Artisan Heritage</text>
          </svg>
          <h2>Welcome to Habiness</h2>
          <p>Create your account to shop unique handcrafted goods, save your favorites, and track your orders.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script src="auth.js" defer></script>
  <script src="cart.js" defer></script>
  <script src="script.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (HabinessAuth.isLoggedIn()) {
        window.location.href = 'shop.html';
        return;
      }

      const form = document.getElementById('signup-form');
      const errorDiv = document.getElementById('signup-error');
      const errorText = document.getElementById('signup-error-text');
      const signupBtn = document.getElementById('signup-btn');
      const btnText = signupBtn.querySelector('.btn-text');
      const btnLoader = signupBtn.querySelector('.btn-loader');

      // Password toggles
      setupPasswordToggle('password', 'password-toggle');
      setupPasswordToggle('confirmPassword', 'confirm-password-toggle');

      function setupPasswordToggle(inputId, toggleId) {
        const input = document.getElementById(inputId);
        const toggle = document.getElementById(toggleId);
        const eyeOpen = toggle.querySelector('.eye-open');
        const eyeClosed = toggle.querySelector('.eye-closed');

        toggle.addEventListener('click', () => {
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          eyeOpen.style.display = isPassword ? 'none' : 'block';
          eyeClosed.style.display = isPassword ? 'block' : 'none';
        });
      }

      // Password strength indicator
      const passwordInput = document.getElementById('password');
      const strengthIndicator = document.getElementById('password-strength');

      passwordInput.addEventListener('input', () => {
        const password = passwordInput.value;
        let strength = 0;
        let text = '';
        let color = '';

        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        if (password.length === 0) {
          strengthIndicator.textContent = '';
          strengthIndicator.className = 'password-strength';
        } else if (strength <= 2) {
          text = 'Weak';
          color = 'weak';
        } else if (strength <= 3) {
          text = 'Medium';
          color = 'medium';
        } else {
          text = 'Strong';
          color = 'strong';
        }

        if (text) {
          strengthIndicator.textContent = `Password strength: ${text}`;
          strengthIndicator.className = `password-strength password-${color}`;
        }
      });

      // Form submission
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Clear previous errors
        errorDiv.style.display = 'none';
        document.querySelectorAll('.field-error').forEach(el => el.textContent = '');
        document.querySelectorAll('input').forEach(input => input.classList.remove('error'));

        const formData = {
          firstName: document.getElementById('firstName').value.trim(),
          lastName: document.getElementById('lastName').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          password: document.getElementById('password').value,
          confirmPassword: document.getElementById('confirmPassword').value
        };

        // Validation
        let hasError = false;

        if (!formData.firstName) {
          showFieldError('firstName', 'First name is required');
          hasError = true;
        }

        if (!formData.lastName) {
          showFieldError('lastName', 'Last name is required');
          hasError = true;
        }

        if (!formData.email) {
          showFieldError('email', 'Email is required');
          hasError = true;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
          showFieldError('email', 'Please enter a valid email address');
          hasError = true;
        }

        if (!formData.password) {
          showFieldError('password', 'Password is required');
          hasError = true;
        } else if (formData.password.length < 6) {
          showFieldError('password', 'Password must be at least 6 characters');
          hasError = true;
        }

        if (formData.password !== formData.confirmPassword) {
          showFieldError('confirmPassword', 'Passwords do not match');
          hasError = true;
        }

        if (hasError) return;

        // Show loading state
        signupBtn.disabled = true;
        btnText.style.display = 'none';
        btnLoader.style.display = 'inline-flex';

        // Simulate API delay
        await new Promise(resolve => setTimeout(resolve, 1000));

        const result = HabinessAuth.register(formData);

        if (result.success) {
          // Show success and redirect
          showToast('Account created successfully! Redirecting...', 'success');
          
          setTimeout(() => {
            const redirect = sessionStorage.getItem('redirect_after_login') || 'shop.html';
            sessionStorage.removeItem('redirect_after_login');
            window.location.href = redirect;
          }, 1500);
        } else {
          // Show error
          errorText.textContent = result.error;
          errorDiv.style.display = 'flex';
          
          signupBtn.disabled = false;
          btnText.style.display = 'inline';
          btnLoader.style.display = 'none';
        }
      });

      function showFieldError(fieldId, message) {
        const input = document.getElementById(fieldId);
        const error = document.getElementById(`${fieldId}-error`);
        input.classList.add('error');
        error.textContent = message;
      }
    });

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast toast-${type} show`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
